<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Sky gradient background -->
  <defs>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#0369a1"/>
    </linearGradient>
    <linearGradient id="seaGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0284c7"/>
      <stop offset="100%" stop-color="#0c4a6e"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="8" fill="url(#skyGrad)"/>
  <!-- Sun -->
  <circle cx="44" cy="18" r="7" fill="#f59e0b"/>
  <line x1="44" y1="8" x2="44" y2="5" stroke="#f59e0b" stroke-width="2" stroke-linecap="round"/>
  <line x1="44" y1="28" x2="44" y2="31" stroke="#f59e0b" stroke-width="2" stroke-linecap="round"/>
  <line x1="34" y1="18" x2="31" y2="18" stroke="#f59e0b" stroke-width="2" stroke-linecap="round"/>
  <line x1="54" y1="18" x2="57" y2="18" stroke="#f59e0b" stroke-width="2" stroke-linecap="round"/>
  <line x1="37" y1="11" x2="35" y2="9" stroke="#f59e0b" stroke-width="2" stroke-linecap="round"/>
  <line x1="51" y1="25" x2="53" y2="27" stroke="#f59e0b" stroke-width="2" stroke-linecap="round"/>
  <line x1="51" y1="11" x2="53" y2="9" stroke="#f59e0b" stroke-width="2" stroke-linecap="round"/>
  <line x1="37" y1="25" x2="35" y2="27" stroke="#f59e0b" stroke-width="2" stroke-linecap="round"/>
  <!-- Sea waves -->
  <rect x="0" y="40" width="64" height="24" rx="0" fill="url(#seaGrad)"/>
  <!-- Wave 1 -->
  <path d="M0 40 Q8 36 16 40 Q24 44 32 40 Q40 36 48 40 Q56 44 64 40 L64 48 Q56 44 48 48 Q40 52 32 48 Q24 44 16 48 Q8 52 0 48 Z" fill="#0ea5e9" opacity="0.6"/>
  <!-- Wave 2 -->
  <path d="M0 48 Q8 44 16 48 Q24 52 32 48 Q40 44 48 48 Q56 52 64 48 L64 56 Q56 52 48 56 Q40 60 32 56 Q24 52 16 56 Q8 60 0 56 Z" fill="#38bdf8" opacity="0.4"/>
  <!-- Cliff/mountain silhouette -->
  <path d="M0 40 L10 28 L18 34 L26 20 L34 30 L40 40 Z" fill="#c2410c" opacity="0.85"/>
  <!-- Small house -->
  <rect x="20" y="27" width="6" height="5" fill="#fde68a"/>
