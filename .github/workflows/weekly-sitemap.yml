name: Weekly Sitemap Rebuild

on:
  schedule:
    # Ogni lunedì alle 03:00 UTC
    - cron: '0 3 * * 1'
  workflow_dispatch:

jobs:
  trigger-rebuild:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trigger rebuild via empty commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "chore: weekly sitemap rebuild [$(date +'%Y-%m-%d')]"
          git push
